<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <script>
    // Capture the original requested path
    const path = window.location.pathname;
    
    // If it's a /route/ path, redirect to route.html with the path as a query parameter
    if (path.includes('/route/')) {
      // Extract the route slug from the path (e.g., /route/station1-to-station2)
      const routeMatch = path.match(/\/route\/(.+?)(?:\/|$)/);
      if (routeMatch) {
        const slug = routeMatch[1];
        // Redirect to route.html with the slug preserved
        window.location.replace('/metroguideindia_/route.html?slug=' + encodeURIComponent(slug));
      } else {
        // Fallback to route.html
        window.location.replace('/metroguideindia_/route.html');
      }
    } else {
      // For any other 404, redirect to home
      window.location.replace('/metroguideindia_/');
    }
  </script>
</head>
<body>
  <p>Redirecting you to the correct page...</p>
</body>
</html>
