<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Page Not Found | MetroGuideIndia</title>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests"/>
  <link rel="stylesheet" href="/css/styles.css"/>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-SV6378N2ZW');
</script>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo"><div class="logo-icon">🚄</div>MetroGuideIndia</a>
  </div>
</nav>
<main>
  <div class="wrap" style="padding:80px 18px;text-align:center">
    <div style="font-size:3rem;margin-bottom:16px">🚉</div>
    <h1 style="font-family:Syne,sans-serif;font-size:1.6rem;margin-bottom:10px">Page Not Found</h1>
    <p style="color:var(--muted);margin-bottom:28px">The page you're looking for doesn't exist.</p>
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;padding:12px 24px;border-radius:var(--r-sm);font-weight:600;text-decoration:none">← Back to Home</a>
  </div>
</main>
<script>
(function () {
  // Handle legacy dynamic URLs — redirect to new static pages
  var path = window.location.pathname || '/';
  var search = window.location.search || '';

  // /blog/?id=X  →  /blog/X.html
  if (path.indexOf('/blog') !== -1 && search.indexOf('id=') !== -1) {
    var id = new URLSearchParams(search).get('id');
    if (id) { window.location.replace('/blog/' + encodeURIComponent(id) + '.html'); return; }
    window.location.replace('/blog'); return;
  }

  // /route?from=A&to=B  →  /routes/A-to-B.html
  if (path.indexOf('/route') !== -1 && search.indexOf('from=') !== -1) {
    var params = new URLSearchParams(search);
    var from = params.get('from'), to = params.get('to');
    if (from && to) {
      var slug = stationToSlug(from) + '-to-' + stationToSlug(to);
      window.location.replace('/routes/' + encodeURIComponent(slug) + '.html'); return;
    }
    window.location.replace('/'); return;
  }

  // /post.html?id=X  →  /blog/X.html
  if (path.indexOf('/post') !== -1 && search.indexOf('id=') !== -1) {
    var id2 = new URLSearchParams(search).get('id');
    if (id2) { window.location.replace('/blog/' + encodeURIComponent(id2) + '.html'); return; }
  }

  function stationToSlug(id) {
    return id.replace(/_rrts$/, '').replace(/_meerut_metro$/, '').replace(/_/g, '-');
  }
})();
</script>
</body>
</html>
