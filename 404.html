<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Page Not Found | MetroGuideIndia</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo"><div class="logo-icon">🚄</div>MetroGuideIndia</a>
  </div>
</nav>

<main>
  <div class="wrap" style="padding:80px 18px;text-align:center">
    <div style="font-size:3rem;margin-bottom:16px">🚉</div>
    <h1 style="font-family:Syne,sans-serif;font-size:1.6rem;margin-bottom:10px">Page Not Found</h1>
    <p style="color:var(--muted);margin-bottom:28px">Redirecting…</p>
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;padding:12px 24px;border-radius:var(--r-sm);font-weight:600;text-decoration:none">← Back to Home</a>
  </div>
</main>

<script>
(function () {
  // Known first-level page segments (not repo base-path segments)
  var knownPages = ["blog", "post", "stations", "timings", "fares", "route",
                    "about", "contact", "privacy", "terms", "disclaimer"];

  // Detect base path (custom domain => "", project pages => "/<repo>")
  var path = window.location.pathname || "/";
  var parts = path.split("/").filter(Boolean);

  // If first segment is not a known page name, treat it as a base path segment.
  // Examples:
  //   /route/slug                     => basePath ""
  //   /blog/                          => basePath ""
  //   /metroguideindia_/route/slug    => basePath "/metroguideindia_"
  var basePath = "";
  if (parts.length && knownPages.indexOf(parts[0]) === -1) {
    basePath = "/" + parts[0];
  }

  // Handle /blog/* paths — redirect to blog.html or post.html
  var blogIndex = parts.indexOf("blog");
  if (blogIndex !== -1) {
    var id = new URLSearchParams(window.location.search).get("id");
    if (id) {
      window.location.replace(basePath + "/post.html?id=" + encodeURIComponent(id));
    } else {
      window.location.replace(basePath + "/blog.html");
    }
    return;
  }

  // Handle /route/<slug>
  var routeIndex = parts.indexOf("route");
  if (routeIndex !== -1 && parts.length > routeIndex + 1) {
    var slug = parts.slice(routeIndex + 1).join("/"); // normally one segment, but safe
    try { sessionStorage.setItem("mgi_route_slug", slug); } catch (e) {}

    var target = basePath + "/route.html?r=" + encodeURIComponent(slug);
    window.location.replace(target);
    return;
  }

  // Default fallback: go home
  window.location.replace(basePath + "/");
})();
</script>
</body>
</html>
