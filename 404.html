<main>

<section id="global-search-section" style="margin:28px 0 36px">
  <div class="sec-eye">Route Planner</div>
  <h2 class="sec-head" style="margin-bottom:10px">Plan a Route</h2>
  <p style="color:var(--muted);font-size:.88rem;margin:0 0 14px">Search any two stations to open the route planner with the correct city dataset.</p>
  <div class="sc">
    <div class="fd">
      <label class="fl" for="global-src-search">From</label>
      <div class="ac-wrap">
        <input type="text" id="global-src-search" class="ac-input" placeholder="Search station…" autocomplete="off" spellcheck="false" aria-label="Source station">
        <input type="hidden" id="global-src">
        <ul class="ac-list" id="global-src-list" hidden></ul>
      </div>
    </div>

    <div class="swap-row">
      <button class="swap" id="global-swap-btn" title="Swap stations" aria-label="Swap stations" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M7 16l-4-4 4-4M17 8l4 4-4 4M3 12h18"/></svg>
      </button>
    </div>

    <div class="fd">
      <label class="fl" for="global-dst-search">To</label>
      <div class="ac-wrap">
        <input type="text" id="global-dst-search" class="ac-input" placeholder="Search station…" autocomplete="off" spellcheck="false" aria-label="Destination station">
        <input type="hidden" id="global-dst">
        <ul class="ac-list" id="global-dst-list" hidden></ul>
      </div>
    </div>

    <button class="btn-find" id="global-find-btn" type="button"><span class="btn-label">Find Route</span></button>
  </div>
</section>
</main>
<script>
(function () {
  // Handle legacy dynamic URLs — redirect to new static pages
  var path = window.location.pathname || '/';
  var search = window.location.search || '';

  // /blog/?id=X  →  /blog/X.html
  if (path.indexOf('/blog') !== -1 && search.indexOf('id=') !== -1) {
    var id = new URLSearchParams(search).get('id');
    if (id) { window.location.replace('/blog/' + encodeURIComponent(id) + '.html'); return; }
    window.location.replace('/blog'); return;
  }

  // /route?from=A&to=B  →  /routes/A-to-B.html
  if (path.indexOf('/route') !== -1 && search.indexOf('from=') !== -1) {
    var params = new URLSearchParams(search);
    var from = params.get('from'), to = params.get('to');
    if (from && to) {
      var slug = stationToSlug(from) + '-to-' + stationToSlug(to);
      window.location.replace('/routes/' + encodeURIComponent(slug) + '.html'); return;
    }
    window.location.replace('/'); return;
  }

  // /post.html?id=X  →  /blog/X.html
  if (path.indexOf('/post') !== -1 && search.indexOf('id=') !== -1) {
    var id2 = new URLSearchParams(search).get('id');
    if (id2) { window.location.replace('/blog/' + encodeURIComponent(id2) + '.html'); return; }
  }

  function stationToSlug(id) {
    return id.replace(/_rrts$/, '').replace(/_meerut_metro$/, '').replace(/_/g, '-');
  }
})();
</script>

<script src="/js/globalSearchBar.js?v=20260410"></script>
