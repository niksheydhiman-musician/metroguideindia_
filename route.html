<main>
<div class="wrap">
  <div style="padding:32px 0 0">
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>

  </div>

  <section id="route-result" aria-live="polite" style="display:none"></section>

  <!-- Always show the search card so user can plan another route -->
  <section style="margin:24px 0 48px">
    <div class="sc">
      <div class="fd">
        <label class="fl" for="src">From</label>
        <select id="src" class="sel"><option value="">Select source station</option></select>
      </div>
      <div class="swap-row">
        <button class="swap" id="swap-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M7 16l-4-4 4-4M17 8l4 4-4 4M3 12h18"/></svg>
        </button>
      </div>
      <div class="fd">
        <label class="fl" for="dst">To</label>
        <select id="dst" class="sel"><option value="">Select destination station</option></select>
      </div>
      <button class="btn-find" id="find-btn" onclick="onFind()">
        <span class="btn-label">Find Route</span>
      </button>
    </div>
  </section>
</div>
</main>
<footer>

    </div>
    <div class="foot-copy">© 2026 MetroGuideIndia. Not affiliated with NCRTC.</div>
  </div>
</footer>
<button class="up-btn" id="up-btn" aria-label="Back to top">↑</button>

<script src="/js/dataLoader.js"></script>
<script src="/js/graphBuilder.js"></script>
<script src="/js/routeFinder.js"></script>
<script src="/js/routeUI.js"></script>
<script src="/js/seoGenerator.js"></script>
<script>
/* ─────────────────────────────────────────────────────────────────────────────
   route.html — SEO-friendly route result page
   
   BASE_PATH: detects the subdirectory the site is hosted under.
   e.g. on GitHub Pages at /metroguideindia_/ this is '/metroguideindia_'
   On a custom domain at root this is ''
───────────────────────────────────────────────────────────────────────────── */
const BASE_PATH = (function() {
  // Strip the filename and any trailing /route/slug portion
  var path = window.location.pathname;
  // If we're on route.html directly, strip the filename
  path = path.replace(/\/route\.html.*$/, '');
  // If we're on a /route/slug path, strip that
  path = path.replace(/\/route\/.*$/, '');
  // Remove trailing slash
  return path.replace(/\/$/, '');
})();
   Reads the route slug from:
     1. sessionStorage (set by 404.html redirect from /route/slug)
     2. ?r=slug query param  (fallback, also set by 404.html)
   Resolves station IDs, runs the routing engine, renders the result.
───────────────────────────────────────────────────────────────────────────── */

let DATA = null, GRAPH = null;

/* ── Slug ↔ station_id resolution ──────────────────────────────────────────
   Rules:
   - Strip _rrts / _meerut_metro suffix to build slug
   - For ambiguous stations (both systems share a name), RRTS is canonical in URLs
   - station_id → slug: replace underscores with hyphens, strip system suffixes
   - slug → station_id: match against all station_ids, prefer RRTS for ambiguous
───────────────────────────────────────────────────────────────────────────── */
function stationToSlug(station_id) {
  return station_id
    .replace(/_rrts$/, '')
    .replace(/_meerut_metro$/, '')
    .replace(/_/g, '-');
}

function slugToStationId(slug, stations) {
  // Direct match after normalising underscores→hyphens and stripping suffixes
  const candidates = stations.filter(s => stationToSlug(s.station_id) === slug);
  if (!candidates.length) return null;
  // If multiple (ambiguous interchange station), prefer RRTS
  const rrts = candidates.find(s => s.system_id === 'rrts');
  return (rrts || candidates[0]).station_id;
}

/* ── Parse the route slug ────────────────────────────────────────────────────
   Slug format: "{from-slug}-to-{to-slug}"
   We find the "-to-" separator by trying all split points and seeing which
   produces valid station matches, to avoid issues with station names
   containing the word "to" (none currently, but future-proofed).
───────────────────────────────────────────────────────────────────────────── */
function parseSlug(slug, stations) {
  // Try splitting on "-to-" — try all occurrences (some slugs might match)
  const parts = slug.split('-to-');
  // parts[0] = from, parts.slice(1).join('-to-') = to  (handles e.g. "a-to-b-to-c" edge)
  for (let i = 1; i < parts.length; i++) {
    const fromSlug = parts.slice(0, i).join('-to-');
    const toSlug   = parts.slice(i).join('-to-');
    const fromId   = slugToStationId(fromSlug, stations);
    const toId     = slugToStationId(toSlug, stations);
    if (fromId && toId && fromId !== toId) return { fromId, toId, fromSlug, toSlug };
  }
  return null;
}

/* ── Get the slug from sessionStorage or ?r= param ──────────────────────── */
function getRouteSlug() {
  // 1. sessionStorage (set by 404.html)
  try {
    const stored = sessionStorage.getItem('mgi_route_slug');
    if (stored) { sessionStorage.removeItem('mgi_route_slug'); return stored; }
  } catch(e) {}
  // 2. ?r= query param (also set by 404.html as fallback)
  const r = new URLSearchParams(window.location.search).get('r');
  if (r) return decodeURIComponent(r);
  return null;
}

/* ── Main ────────────────────────────────────────────────────────────────── */
DataLoader.loadAll().then(data => {
  DATA  = data;
  GRAPH = GraphBuilder.build(data.connections);
  populateSelects(data.stations);
  attachSwap();

  const slug = getRouteSlug();
  if (slug) {
    const parsed = parseSlug(slug, data.stations);
    if (parsed) {
      // Set canonical URL in address bar (clean path, no ?r= param)
      const canonicalPath = BASE_PATH + '/route/' + slug;
      if (window.location.pathname !== canonicalPath) {
        history.replaceState({}, '', canonicalPath);
      }
      // Pre-select dropdowns
      document.getElementById('src').value = parsed.fromId;
      document.getElementById('dst').value = parsed.toId;
      // Run the route
      go(parsed.fromId, parsed.toId);
    } else {
      showError('Could not resolve stations from URL. Please use the search below.');
    }
  } else {
    // No slug — just show the blank search UI
    document.getElementById('pg-sub').textContent = 'Select stations below to plan your journey.';
  }
}).catch(err => {
  console.error('DataLoader error:', err);
  showError('Could not load station data. Please refresh and try again.');
});

/* ── Route execution ─────────────────────────────────────────────────────── */
function go(src, dst) {
  const path = RouteFinder.findRoute(GRAPH, src, dst);
  if (!path?.length) {
    showError('No route found between these stations. Please try a different combination.');
    return;
  }

  const dist = RouteFinder.calcDistance(path, GRAPH);
  const fare = RouteFinder.calcFare(path);
  const nX   = path.filter(p => p.line_id === 'interchange').length;
  const time = RouteFinder.calcTime(dist, nX);

  RouteUI.renderRoute('route-result', path, DATA.stations, DATA.interchanges, dist, fare, time);
  document.getElementById('route-result').style.display = 'block';

  const srcSt = DATA.stations.find(s => s.station_id === src);
  const dstSt = DATA.stations.find(s => s.station_id === dst);

  if (srcSt && dstSt) {
    // SEO — dynamic title, description, canonical
    const fromName = srcSt.station_name;
    const toName   = dstSt.station_name;
    const title    = `${fromName} to ${toName} Route | Distance, Fare and Stations | MetroGuideIndia`;
    const desc     = `${fromName} to ${toName}: ${dist} km, ~${time} min, ₹${fare} standard fare. Step-by-step station list with interchange guide for Namo Bharat RRTS & Meerut Metro.`;

    document.title = title;
    setMeta('description', desc);
    setMeta('og:title', title, true);
    setMeta('og:description', desc, true);
    setMeta('twitter:title', title);
    setMeta('twitter:description', desc);

    // Set canonical link tag
    let canon = document.querySelector('link[rel="canonical"]');
    if (!canon) { canon = document.createElement('link'); canon.rel = 'canonical'; document.head.appendChild(canon); }
    const slug = stationToSlug(src) + '-to-' + stationToSlug(dst);
    canon.href = window.location.origin + BASE_PATH + '/route/' + slug;

    // Update page heading
    document.getElementById('pg-title').textContent = `${fromName} → ${toName}`;
    document.getElementById('pg-sub').textContent   = `${dist} km · ₹${fare} · ~${time} min`;

    // Append SEO block inside result card
    const names  = path.map(p => DATA.stations.find(s => s.station_id === p.station_id)?.station_name || p.station_id);
    const seoHTML = SEOGenerator.seoBlock(fromName, toName, names, dist, fare, time);
    const card    = document.querySelector('.rc');
    if (card) { const d = document.createElement('div'); d.innerHTML = seoHTML; card.appendChild(d.firstElementChild); }
  }

  setTimeout(() => document.getElementById('route-result').scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
}

/* ── onFind — navigate to clean /route/ URL ──────────────────────────────── */
function onFind() {
  const src = document.getElementById('src').value;
  const dst = document.getElementById('dst').value;
  if (!src || !dst) {
    alert('Please select both a source and destination station.');
    return;
  }
  if (src === dst) {
    alert('Source and destination cannot be the same.');
    return;
  }
  const slug = stationToSlug(src) + '-to-' + stationToSlug(dst);
  // Navigate to the clean URL — 404.html will handle the redirect back here
  window.location.href = window.location.origin + BASE_PATH + '/route/' + slug;
}

/* ── Populate dropdowns ──────────────────────────────────────────────────── */
function populateSelects(stations) {
  const src = document.getElementById('src');
  const dst = document.getElementById('dst');

  // Deduplicate by station_name — prefer RRTS entry for interchange stations
  const seen = new Set();
  const unique = stations.filter(s => {
    const k = s.station_name;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  // Group by system for optgroup
  const rrts  = unique.filter(s => s.system_id === 'rrts');
  const metro = unique.filter(s => s.system_id !== 'rrts');

  function buildOptions(list) {
    return list.map(s => `<option value="${s.station_id}">${s.station_name} — ${s.city}</option>`).join('');
  }

  const html = `
    <optgroup label="Namo Bharat RRTS">${buildOptions(rrts)}</optgroup>
    <optgroup label="Meerut Metro">${buildOptions(metro)}</optgroup>`;

  src.innerHTML = '<option value="">Select source station</option>' + html;
  dst.innerHTML = '<option value="">Select destination station</option>' + html;
}

/* ── Swap button ─────────────────────────────────────────────────────────── */
function attachSwap() {
  document.getElementById('swap-btn').addEventListener('click', () => {
    const s = document.getElementById('src'), d = document.getElementById('dst');
    [s.value, d.value] = [d.value, s.value];
  });
}

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function showError(msg) {
  RouteUI.renderError('route-result', msg);
  document.getElementById('route-result').style.display = 'block';
  document.getElementById('pg-sub').textContent = 'Route not found';
}

function setMeta(k, v, isProp = false) {
  const attr = isProp ? 'property' : 'name';
  let el = document.querySelector(`meta[${attr}="${k}"]`);
  if (!el) { el = document.createElement('meta'); el.setAttribute(attr, k); document.head.appendChild(el); }
  el.setAttribute('content', v);
}

/* ── Scroll-to-top ───────────────────────────────────────────────────────── */
const upBtn = document.getElementById('up-btn');
window.addEventListener('scroll', () => upBtn.classList.toggle('up-btn-show', window.scrollY > 300), { passive: true });
upBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>
</body>
</html>
