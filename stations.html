<script>
const BASE_PATH = (() => {
  let path = window.location.pathname || '';
  path = path.replace(/\/stations(?:\.html)?\/?$/, '');
  return path.replace(/\/$/, '');
})();

const CITY_META = {
  namo_bharat: { label: 'Namo Bharat', subtitle: 'Namo Bharat RRTS + Meerut Metro station list.' },
  delhi: { label: 'Delhi', subtitle: 'DMRC station list generated from /data/delhi.json.' },
  bengaluru: { label: 'Bengaluru', subtitle: 'BMRCL station list generated from /data/bengaluru.json.' }
};

let ACTIVE_CITY = 'namo_bharat';
let SEARCH_QUERY = '';
let DATA = { namo_bharat: { stations: [], lines: {} }, delhi: { stations: [], lines: {} }, bengaluru: { stations: [], lines: {} } };
const COLOR_SOFT_BG_ALPHA = '1A';

(async function init(){
  try {
    const fetchJson = async (url, label) => {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(label + ' (HTTP ' + response.status + ')');
      return response.json();
    };

    const [namoStations, delhi, bengaluru] = await Promise.all([
      fetchJson(BASE_PATH + '/data/stations.json', 'Namo Bharat stations'),
      fetchJson(BASE_PATH + '/data/delhi.json', 'Delhi Metro data'),
      fetchJson(BASE_PATH + '/data/bengaluru.json', 'Bengaluru Metro data')
    ]);

    DATA.namo_bharat = {
      stations: namoStations
        .filter(s => s.system_id === 'rrts' || s.system_id === 'meerut_metro')
        .sort((a, b) => Number(a.order) - Number(b.order)),
      lines: {
        rrts_main: { line_name: 'Namo Bharat RRTS', color: '#c0392b' },
        meerut_metro_main: { line_name: 'Meerut Metro', color: '#27764a' }
      }
    };

    DATA.delhi = {
      stations: (delhi.stations || []).slice().sort((a, b) => {
        if (a.line_id === b.line_id) return Number(a.order) - Number(b.order);
        return (a.line_id || '').localeCompare(b.line_id || '');
      }),
      lines: Object.fromEntries((delhi.lines || []).map(l => [l.line_id, l]))
    };

    DATA.bengaluru = {
      stations: (bengaluru.stations || []).slice().sort((a, b) => {
        if (a.line_id === b.line_id) return Number(a.order) - Number(b.order);
        return (a.line_id || '').localeCompare(b.line_id || '');
      }),
      lines: Object.fromEntries((bengaluru.lines || []).map(l => [l.line_id, l]))
    };

    bindEvents();
    render();
  } catch (err) {
    console.error('Station data load failed', err);
    document.getElementById('stations-container').innerHTML = `<p style="color:var(--muted);text-align:center;padding:30px 0">Could not load station data: ${err.message}</p>`;
  }
})();

function bindEvents() {
  document.getElementById('city-tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.city-tab');
    if (!btn) return;
    ACTIVE_CITY = btn.dataset.city;
    document.querySelectorAll('.city-tab').forEach(tab => tab.classList.toggle('active', tab === btn));
    render();
  });

  document.getElementById('search-bar').addEventListener('input', (e) => {
    SEARCH_QUERY = (e.target.value || '').trim().toLowerCase();
    render();
  });
}

function render() {
  const subtitle = document.getElementById('stations-subtitle');
  subtitle.textContent = CITY_META[ACTIVE_CITY].subtitle;

  const cityData = DATA[ACTIVE_CITY];
  const lines = cityData.lines || {};
  const filtered = (cityData.stations || []).filter(s => {
    if (!SEARCH_QUERY) return true;
    const line = lines[s.line_id] || {};
    return [s.station_name, s.city, line.line_name, s.system_id].join(' ').toLowerCase().includes(SEARCH_QUERY);
  });

  const container = document.getElementById('stations-container');
  if (!filtered.length) {
    container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:30px 0">No stations match your search.</p>';
    return;
  }

  const grouped = filtered.reduce((acc, s) => {
    const key = s.line_id || s.system_id || 'network';
    if (!acc[key]) acc[key] = [];
    acc[key].push(s);
    return acc;
  }, {});

  container.innerHTML = Object.entries(grouped).map(([lineId, stations]) => {
    const line = lines[lineId] || {};
    const lineName = line.line_name || (lineId === 'rrts_main' ? 'Namo Bharat RRTS' : 'Network');
    const color = line.color || (lineId === 'meerut_metro_main' ? '#27764a' : '#c0392b');

    return `
      <section class="section">
        <div class="section-head">
          <div class="station-dot" style="border-color:${color};background:${color}${COLOR_SOFT_BG_ALPHA}"></div>
          <div>
            <div class="section-title">${lineName}</div>
            <div class="section-meta">${stations.length} stations</div>
          </div>
        </div>
        ${stations.map(s => stationCard(s, lineName, color)).join('')}
      </section>`;
  }).join('');
}

function stationCard(station, lineName, color) {
  const LINE_BORDER_ALPHA = '66';
  const LINE_BG_ALPHA = '14';
  const hasIx = station.interchange === 'yes' || station.is_interchange === true;
  return `
    <article class="station-card">
      <div class="station-dot" style="border-color:${color};background:${color}${COLOR_SOFT_BG_ALPHA}"></div>
      <div class="station-main">
        <div class="station-name">${station.station_name}</div>
        <div class="station-sub">
          <span>${station.city || 'Urban network'}</span>
          <span class="line-pill" style="color:${color};border-color:${color}${LINE_BORDER_ALPHA};background:${color}${LINE_BG_ALPHA}">${lineName}</span>
          ${hasIx ? '<span class="ix-badge">🔄 Interchange</span>' : ''}
        </div>
      </div>
    </article>`;
}
</script>
