<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">RRTS Parking Fare Snapshot</title>
  <desc id="desc">Snapshot of RRTS parking charges and monthly pass rates for key Delhi and Ghaziabad stations.</desc>
  <defs>
    <style>
      .bg { fill: #f9fafb; }
      .card { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; rx: 18; }
      .title { font: 700 44px Arial, sans-serif; fill: #111827; }
      .sub { font: 400 22px Arial, sans-serif; fill: #4b5563; }
      .th { font: 700 24px Arial, sans-serif; fill: #b91c1c; }
      .td { font: 500 22px Arial, sans-serif; fill: #1f2937; }
      .foot { font: 400 19px Arial, sans-serif; fill: #6b7280; }
      .line { stroke: #e5e7eb; stroke-width: 1.5; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="700"/>
  <rect class="card" x="44" y="40" width="1112" height="620"/>
  <text class="title" x="88" y="110">RRTS Parking Charges &amp; Monthly Pass Snapshot</text>
  <text class="sub" x="88" y="148">Indicative commuter rates for Delhi and Ghaziabad side stations</text>

  <text class="th" x="88" y="220">Station</text>
  <text class="th" x="380" y="220">Bike (Daily)</text>
  <text class="th" x="610" y="220">Car (Daily)</text>
  <text class="th" x="830" y="220">Bike (Monthly)</text>
  <text class="th" x="1040" y="220">Car (Monthly)</text>
  <line class="line" x1="88" y1="240" x2="1112" y2="240"/>

  <text class="td" x="88" y="290">Ghaziabad</text>
  <text class="td" x="400" y="290">₹20</text>
  <text class="td" x="630" y="290">₹60</text>
  <text class="td" x="865" y="290">₹350</text>
  <text class="td" x="1060" y="290">₹1300</text>
  <line class="line" x1="88" y1="312" x2="1112" y2="312"/>

  <text class="td" x="88" y="360">Sahibabad</text>
  <text class="td" x="400" y="360">₹20</text>
  <text class="td" x="630" y="360">₹60</text>
  <text class="td" x="865" y="360">₹350</text>
  <text class="td" x="1060" y="360">₹1300</text>
  <line class="line" x1="88" y1="382" x2="1112" y2="382"/>

  <text class="td" x="88" y="430">Anand Vihar</text>
  <text class="td" x="400" y="430">₹30</text>
  <text class="td" x="630" y="430">₹100</text>
  <text class="td" x="865" y="430">₹500</text>
  <text class="td" x="1060" y="430">₹1800</text>
  <line class="line" x1="88" y1="452" x2="1112" y2="452"/>

  <text class="td" x="88" y="500">New Ashok Nagar</text>
  <text class="td" x="400" y="500">₹30</text>
  <text class="td" x="630" y="500">₹100</text>
  <text class="td" x="865" y="500">₹500</text>
  <text class="td" x="1060" y="500">₹1800</text>

  <text class="foot" x="88" y="584">* Fare image created for MetroGuideIndia RRTS parking guide. Please verify latest rates at station counters.</text>
</svg>
